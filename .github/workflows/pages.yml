name: Build & Deploy Evidence Report

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pages.yml'
      - 'data/enriched.csv'
      - 'docs/.nojekyll'
      - 'docs/build_datajson.py'
      - 'docs/domains.html'
      - 'docs/index.html'
      - 'docs/llms.txt'
      - 'docs/robots.txt'
      - 'docs/sitemap.xml'
  workflow_dispatch:
    inputs:
      ss_base:
        description: "S3 base URL for screenshots (leave empty for no screenshots)"
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build data.json
        run: |
          python docs/build_datajson.py \
            --enriched data/enriched.csv \
            --ss-base "${{ github.event.inputs.ss_base }}" \
            --out docs/data.json

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json pkg/ evidence/HASHES.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "report: update evidence data $(date -u '+%Y-%m-%d')"
          git push origin HEAD:main

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - id: deployment
        uses: actions/deploy-pages@v4
